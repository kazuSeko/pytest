name: Python Basic Test

on: [push] # コードをpushするたびに勝手に動く

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # GitHubからコードを持ってくる
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pytest
        run: pip install pytest

      - name: Run pytest
        run: pytest # ここで test_main.py が実行される